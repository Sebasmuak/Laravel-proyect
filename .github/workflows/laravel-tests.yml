name: Laravel Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Copy .env and generate key
        run: |
          cp .env.example .env
          php artisan key:generate

      # Usaremos SQLite para simplificar las pruebas en CI
      - name: Prepare SQLite for testing
        run: |
          mkdir -p database
          touch database/database.sqlite
          echo "APP_ENV=testing" > .env.testing
          echo "DB_CONNECTION=sqlite" >> .env.testing
          echo "DB_DATABASE=database/database.sqlite" >> .env.testing

      - name: Run migrations (opcional si tus tests las requieren)
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test
